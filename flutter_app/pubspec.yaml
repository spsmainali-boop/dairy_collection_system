name: dairy_collection_system
description: Dairy Collection Management System for Nepal — offline-first, Nepali-first UI.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # Offline local database
  sqflite: ^2.3.3
  sqflite_common_ffi_web: ^1.1.2      # bumped from ^0.4.3 — fixes a version
                                       # mismatch between this package and the
                                       # sqlite3.wasm binary its own setup
                                       # tool downloads, which otherwise causes
                                       # "Unsupported operation: unsupported
                                       # result null (null)" at runtime.
  path: ^1.9.0
  path_provider: ^2.1.4

  # Connectivity + background sync
  connectivity_plus: ^6.0.3
  workmanager: ^0.5.2

  # State management
  flutter_riverpod: ^2.5.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.3

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Exports
  pdf: ^3.11.0
  printing: ^5.13.0
  excel: ^4.0.6

  # Notifications
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
